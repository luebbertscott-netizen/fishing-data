name: Fetch Fishing Reports

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch MDC JSON
        run: |
          node - << 'EOF'
          const https = require('https');
          const fs = require('fs');

          async function fetch(url, file) {
            return new Promise((resolve, reject) => {
              https.get(url, res => {
                let data = "";
                res.on("data", chunk => data += chunk);
                res.on("end", () => {
                  fs.writeFileSync(file, data);
                  resolve();
                });
                res.on("error", reject);
              }).on("error", reject);
            });
          }

          (async () => {
            await fetch(
              "https://mdc.mo.gov/sites/default/files/feeds/fishing_reports.json",
              "mdc.json"
            );
          })();
          EOF

      - name: Fetch KDWP JSON
        run: |
          node - << 'EOF'
          const https = require('https');
          const fs = require('fs');

          async function fetch(url, file) {
            return new Promise((resolve, reject) => {
              https.get(url, res => {
                let data = "";
                res.on("data", chunk => data += chunk);
                res.on("end", () => {
                  fs.writeFileSync(file, data);
                  resolve();
                });
                res.on("error", reject);
              }).on("error", reject);
            });
          }

          (async () => {
            await fetch(
              "https://ksoutdoors.com/api/fishing-reports",
              "kdwp.json"
            );
          })();
          EOF

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add mdc.json kdwp.json
          git commit -m "Update fishing data" || echo "No changes"
          git push

