name: Fetch Fishing Reports

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch MDC JSON
        run: |
          node - << 'EOF'
          const https = require('https');
          const fs = require('fs');

          https.get("https://mdc.mo.gov/sites/default/files/feeds/fishing_reports.json", res => {
            let data = "";
            res.on("data", chunk => data += chunk);
            res.on("end", () => {
              fs.writeFileSync("mdc.json", data);
            });
          });
          EOF

      - name: Fetch KDWP JSON
        run: |
          node - << 'EOF'
          const https = require('https');
          const fs = require('fs');

          https.get("https://ksoutdoors.com/api/fishing-reports", res => {
            let data = "";
            res.on("data", chunk => data += chunk);
            res.on("end", () => {
              fs.writeFileSync("kdwp.json", data);
            });
          });
          EOF

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add mdc.json kdwp.json
          git commit -m "Update fishing data" || echo "No changes"
          git push

