name: Fetch Fishing Reports

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch MDC JSON
        run: |
          node - << 'EOF'
          const https = require('https');
          const fs = require('fs');

          async function fetch(url, file) {
            console.log("Fetching:", url);
            return new Promise((resolve, reject) => {
              https.get(url, res => {
                console.log("Status:", res.statusCode);
                let data = "";
                res.on("data", chunk => data += chunk);
                res.on("end", () => {
                  try {
                    fs.writeFileSync(file, data);
                    console.log("Wrote file:", file);
                    resolve();
                  } catch (err) {
                    console.error("Write error:", err);
                    reject(err);
                  }
                });
                res.on("error", err => {
                  console.error("Response error:", err);
                  reject(err);
                });
              }).on("error", err => {
                console.error("Request error:", err);
                reject(err);
              });
            });
          }

          (async () => {
            try {
              await fetch(
                "https://mdc.mo.gov/sites/default/files/feeds/fishing_reports.json",
                "mdc.json"
              );
            } catch (err) {
              console.error("Fatal error:", err);
              process.exit(1);
            }
          })();
          EOF

      - name: Fetch KDWP JSON
        run: |
          node - << 'EOF'
          const https = require('https');
          const fs = require('fs');

          async function fetch(url, file) {
            console.log("Fetching:", url);
            return new Promise((resolve, reject) => {
              https.get(url, res => {
                console.log("Status:", res.statusCode);
                let data = "";
                res.on("data", chunk => data += chunk);
                res.on("end", () => {
                  try {
                    fs.writeFileSync(file, data);
                    console.log("Wrote file:", file);
                    resolve();
                  } catch (err) {
                    console.error("Write error:", err);
                    reject(err);
                  }
                });
                res.on("error", err => {
                  console.error("Response error:", err);
                  reject(err);
                });
              }).on("error", err => {
                console.error("Request error:", err);
                reject(err);
              });
            });
          }

          (async () => {
            try {
              await fetch(
                "https://ksoutdoors.com/api/fishing-reports",
                "kdwp.json"
              );
            } catch (err) {
              console.error("Fatal error:", err);
              process.exit(1);
            }
          })();
          EOF

      - name: Commit JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add mdc.json kdwp.json
          git commit -m "Update fishing data" || echo "No changes"
          git push

